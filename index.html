<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/1c544df05c.js" crossorigin="anonymous"></script>
    <title>Formulario de Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark">
    <div class="container bg-white mt-5 p-5">
        <form class="row bg-white border rounded">
            <div class="bg-light border p-2 rounded">
                <h4>Payment form Example</h4>
           </div>
           <div class="alert alert-danger" role="alert">
                Some fields are missing
            </div>
            <div class="row mb-4 p-2">
                <div class="col-4">
                    <label for="cardNumber" class="form-label">Card #</label>
                    <input type="number" class="form-control" id="cardNumber" placeholder="xxxxxxxxxxxxxxxx" required>
                </div>
                <div class="col-4">
                    <label for="cvc" class="form-label">CVC</label>
                    <input type="number" class="form-control" id="cvc" placeholder="xyz" required>
                </div>
                <div class="col-4">
                    <label for="amount" class="form-label">Amount ($)</label>
                    <input type="number" class="form-control" id="amount" placeholder="xxxx" required>
                </div>
                <div class="col-6">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="Write your first name" required>
                </div>
                <div class="col-6">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Write your last name" required>
                </div>
                <div class="col-md-6">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city">
                </div>
                <div class="col-md-4">
                    <label for="state" class="form-label">State</label>
                    <select id="inputState" class="form-select">
                        <option selected disabled>Pick a state</option>
                        <option>Estado 1</option>
                        <option>Estado 2</option>
                        <option>Estado 3</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="postalCode" class="form-label">Postal Code</label>
                    <input type="text" class="form-control" id="postalCode">
                </div>
                <div class="col-6">
                    <label for="tipoTarjetas" class="form-label">We accept</label>
                    <div class="d-flex bg-secondary gap-3 rounded p-3 w-50">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="tarjetaMastercard">
                            <label for="Mastercard"><i class="fa-brands fa-cc-mastercard"></i></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="tarjetaVisa" checked>
                            <label for="Visa"><i class="fa-brands fa-cc-visa"></i></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="tarjetaDinners" checked>
                            <label for="Dinners"><i class="fa-brands fa-cc-diners-club"></i></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="flexRadioDefault" id="otraTarjeta" checked>
                            <label for="OtraTarjeta"><i class="fa-solid fa-credit-card"></i></label>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <label for="inputMessage" class="form-label">Message</label>
                    <textarea class="form-control" id="inputMessage" rows="3"></textarea>
                    <p class="small">Add any notes here</p>
                </div>
            </div>
            <div class="bg-light border p-2 rounded d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Send</button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
